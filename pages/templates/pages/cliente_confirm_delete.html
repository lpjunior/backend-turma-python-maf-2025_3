{% extends "pages/base.html" %}

{% block title %}Excluir Cliente{% endblock %}

{% block content %}

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">

      <div class="col-lg-6">
        <div class="card border-danger shadow-sm">
          <div class="card-body p-4 text-center">

            <i class="fa-solid fa-triangle-exclamation fa-2x text-danger mb-3"></i>

            <h1 class="h4 fw-bold mb-3">Confirmar exclusão</h1>

            <p class="text-muted">
              Tem certeza que deseja excluir <strong>{{ pessoa.nome }}</strong>?
            </p>

            <form method="post" class="d-flex justify-content-center gap-2 mt-4">
              {% csrf_token %}
              <button class="btn btn-danger">Excluir</button>
              <a href="{% url 'clientes' %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>

          </div>
        </div>
      </div>

    </div>
  </div>
</section>

{% endblock %}
