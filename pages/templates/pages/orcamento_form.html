{% extends "pages/base.html" %}

{% block title %}Criar Orçamento{% endblock %}

{% block content %}

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">

      <div class="col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">

            <h1 class="h4 fw-bold mb-4">Criar Orçamento</h1>

            <form method="post">
              {% csrf_token %}
              {{ form.as_p }}

              <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'detalhe_solicitacao' solicitacao.id %}" class="btn btn-outline-secondary">
                  Voltar
                </a>

                <button class="btn btn-success">
                  Salvar
                </button>
              </div>

            </form>

          </div>
        </div>
      </div>

    </div>
  </div>
</section>

{% endblock %}
